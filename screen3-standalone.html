<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Voice chat</title>
  <style>
:root {
  --frame-width: 393px;
  --frame-height: 852px;
  --surface: #e2eae8;
  --call-background: #232021;
  --icon-dark: #000;
  --icon-light: #f6fefc;
  --tile-radius: 32px;
  --control-radius: 999px;
  --accent: linear-gradient(119.24deg, #f29b58 47.1%, #db90bd 76.69%);
}

*,
*::before,
*::after {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  min-width: 100%;
  min-height: 100%;
}

body {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  background: #161415;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
}

button {
  margin: 0;
  padding: 0;
  border: 0;
  color: inherit;
  font: inherit;
  cursor: default;
}

.voice-chat {
  position: relative;
  flex: 0 0 var(--frame-width);
  width: var(--frame-width);
  height: var(--frame-height);
  overflow: hidden;
  background: var(--call-background);
}

.upper-surface {
  position: absolute;
  inset: 0 0 auto;
  width: 393px;
  height: 737px;
  overflow: hidden;
  border-radius: 0 0 35px 35px;
  background: var(--surface);
}

.status-bar {
  position: absolute;
  z-index: 5;
  inset: 0 0 auto;
  height: 64px;
  color: var(--icon-dark);
}

.status-time {
  position: absolute;
  top: 20px;
  left: 36px;
  width: 55px;
  font-size: 17px;
  font-weight: 600;
  line-height: 22px;
  letter-spacing: -0.02em;
  text-align: center;
}

.status-levels {
  position: absolute;
  top: 22px;
  right: 31px;
  display: flex;
  height: 14px;
  align-items: center;
  gap: 7px;
}

.status-levels svg {
  display: block;
  overflow: visible;
}

.cellular-icon {
  width: 19.2px;
  height: 13px;
  fill: #000;
}

.wifi-icon {
  width: 18px;
  height: 14px;
  fill: none;
  stroke: #000;
  stroke-width: 2.8;
  stroke-linecap: round;
}

.battery-icon {
  width: 28px;
  height: 14px;
}

.battery-outline {
  fill: none;
  stroke: #000;
  stroke-width: 1;
  opacity: .35;
}

.app-header {
  position: absolute;
  z-index: 4;
  top: 64px;
  left: 0;
  width: 393px;
  height: 55px;
}

.header-button {
  position: absolute;
  top: 0;
  display: grid;
  width: 55px;
  height: 55px;
  place-items: center;
  isolation: isolate;
  border: 0;
  border-radius: var(--control-radius);
  background: transparent;
}

.header-button > svg {
  position: relative;
  z-index: 1;
  width: 35px;
  height: 35px;
  fill: none;
  stroke: currentColor;
  stroke-width: 1.15;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.back-button {
  left: 15px;
}

.chat-button {
  left: 323px;
}

.chat-button > svg path {
  stroke: none;
}

.screen-title {
  position: absolute;
  top: 17.5px;
  left: 143px;
  width: 108px;
  height: 20px;
  margin: 0;
  overflow: hidden;
  color: var(--surface);
  font-family: "Inter Tight", Arial, sans-serif;
  font-size: 25px;
  font-weight: 500;
  line-height: 20px;
  letter-spacing: -.02em;
  text-transform: lowercase;
}

.message-count {
  position: absolute;
  z-index: 2;
  top: 17px;
  left: -11px;
  display: grid;
  width: 21px;
  height: 21px;
  place-items: center;
  border-radius: var(--control-radius);
  background: var(--accent);
  color: #fff;
  font-size: 15px;
  font-weight: 510;
  line-height: 18px;
}

.video-grid {
  position: absolute;
  top: 144px;
  left: 5px;
  display: grid;
  width: 383px;
  height: 588px;
  grid-template-columns: repeat(2, 189px);
  grid-template-rows: repeat(3, 192.6667px);
  gap: 5px;
}

.video-tile {
  position: relative;
  min-width: 0;
  min-height: 0;
  overflow: hidden;
  border-radius: var(--tile-radius);
  background: #4f4f4f;
}

.video-tile > img {
  position: absolute;
  display: block;
  max-width: none;
  object-fit: fill;
  user-select: none;
}

.tile-one > img {
  top: -31.01px;
  left: -74.96px;
  width: 583.06px;
  height: 327px;
}

.tile-two > img {
  top: -18.03px;
  left: -163.96px;
  width: 480px;
  height: 240px;
}

.tile-three > img {
  top: -37.14px;
  left: -177.46px;
  width: 656.12px;
  height: 367.97px;
  transform: scaleX(-1);
}

.tile-four > img {
  top: -27.15px;
  left: -253.06px;
  width: 587.26px;
  height: 391.51px;
}

.tile-five > img {
  top: -86.17px;
  left: -127.16px;
  width: 740.34px;
  height: 493.56px;
}

.tile-six > img {
  top: -108.72px;
  left: -61.91px;
  width: 344.99px;
  height: 515.94px;
  transform: scaleX(-1);
}

.participant-status {
  position: absolute;
  z-index: 2;
  top: 15px;
  left: 15px;
  display: grid;
  width: 35px;
  height: 35px;
  place-items: center;
  isolation: isolate;
  border: 0;
  border-radius: var(--control-radius);
  background: transparent;
  color: #fff;
}

.participant-status svg {
  position: relative;
  z-index: 1;
  width: 24px;
  height: 24px;
  fill: none;
  stroke: currentColor;
  stroke-width: 1.35;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.participant-status .muted-icon {
  stroke-width: 1.25;
}

.call-actions {
  position: absolute;
  z-index: 5;
  top: 762px;
  left: 77px;
  display: flex;
  width: 239px;
  height: 59px;
  align-items: center;
  gap: 5px;
  padding: 2px;
  border-radius: 60px;
  background: var(--call-background);
}

.call-action {
  position: relative;
  isolation: isolate;
  overflow: hidden;
  display: grid;
  flex: 0 0 55px;
  width: 55px;
  height: 55px;
  place-items: center;
  border-radius: 50%;
  background: none;
  color: var(--icon-light);
}

.call-action svg {
  position: relative;
  z-index: 1;
  width: 35px;
  height: 35px;
  fill: none;
  stroke: currentColor;
  stroke-width: 1.35;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.call-action:first-child svg {
  width: 36px;
  height: 36px;
}

.call-action .video-icon {
  fill: var(--icon-light);
  stroke: none;
}

.end-call {
  border: 0;
  background: var(--accent);
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
  box-shadow: none;
  filter: none;
  isolation: auto;
  opacity: 1;
  mix-blend-mode: normal;
}

.end-call .nav-glass-avatar {
  display: none;
}

.end-call::before,
.end-call::after {
  content: none;
}

.end-call svg {
  stroke-width: 1.15;
  filter: none;
  opacity: 1;
  mix-blend-mode: normal;
}

.home-indicator {
  position: absolute;
  z-index: 5;
  bottom: 8px;
  left: 127px;
  width: 139px;
  height: 5px;
  border-radius: var(--control-radius);
  background: #000;
}

.header-button {
  --n: 55;
  --size: calc(var(--n) * 1px);
  --floorB: 1.7px;
  --floorBs: 0.8px;
  --floorA: 1.4px;
  --floorAs: 0.6px;
  --aa: 0.6px;
  --rimB-total: max(calc(var(--size) * 0.0235), var(--floorB));
  --rimB-solid: max(calc(var(--size) * 0.0095), var(--floorBs));
  --rimA-total: max(calc(var(--size) * 0.014), var(--floorA));
  --rimA-solid: max(calc(var(--size) * 0.004), var(--floorAs));
  --keep: clamp(0, calc((var(--n) - 24) / 72), 1);
  isolation: isolate;
  background:
    radial-gradient(
      95% 95% at 76% 76%,
      rgba(255, 255, 255, 0.24),
      rgba(255, 255, 255, 0) 66%
    ),
    linear-gradient(
      135deg,
      rgba(20, 20, 20, 0.025) 0%,
      rgba(20, 20, 20, 0) 58%
    ),
    rgba(255, 255, 255, 0.08);
  -webkit-backdrop-filter: blur(calc(var(--size) * 0.095)) saturate(105%);
  backdrop-filter: blur(calc(var(--size) * 0.095)) saturate(105%);
}

@media (min-resolution: 1.5dppx) {
  .header-button {
    --floorB: 0.9px;
    --floorBs: 0.45px;
    --floorA: 0.75px;
    --floorAs: 0.35px;
    --aa: 0.4px;
    --keep: clamp(0, calc((var(--n) - 14) / 42), 1);
  }
}

.header-button::before {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  content: "";
  pointer-events: none;
  opacity: var(--keep);
  background: conic-gradient(
    from 0deg,
    rgba(255, 255, 255, 0) 0deg,
    rgba(255, 255, 255, 0) 66deg,
    #fff 78deg,
    #fff 188deg,
    rgba(255, 255, 255, 0) 200deg,
    rgba(255, 255, 255, 0) 360deg
  );
  -webkit-mask: radial-gradient(
    closest-side,
    transparent calc(100% - var(--rimB-total)),
    #000 calc(100% - var(--rimB-solid) - var(--aa)),
    #000 calc(100% - var(--aa)),
    transparent 100%
  );
  mask: radial-gradient(
    closest-side,
    transparent calc(100% - var(--rimB-total)),
    #000 calc(100% - var(--rimB-solid) - var(--aa)),
    #000 calc(100% - var(--aa)),
    transparent 100%
  );
}

.header-button::after {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  content: "";
  pointer-events: none;
  opacity: var(--keep);
  background: conic-gradient(
    from 0deg,
    #fff 0deg,
    #fff 10deg,
    rgba(255, 255, 255, 0) 24deg,
    rgba(255, 255, 255, 0) 258deg,
    #fff 274deg,
    #fff 360deg
  );
  -webkit-mask: radial-gradient(
    closest-side,
    transparent calc(100% - var(--rimA-total)),
    #000 calc(100% - var(--rimA-solid) - var(--aa)),
    #000 calc(100% - var(--aa)),
    transparent 100%
  );
  mask: radial-gradient(
    closest-side,
    transparent calc(100% - var(--rimA-total)),
    #000 calc(100% - var(--rimA-solid) - var(--aa)),
    #000 calc(100% - var(--aa)),
    transparent 100%
  );
}

.participant-status {
  --n: 55;
  --size: calc(var(--n) * 1px);
  width: var(--size);
  height: var(--size);
  overflow: hidden;
  isolation: isolate;
  border: 0;
  border-radius: 50%;
  background: linear-gradient(
    80deg,
    rgba(255, 255, 255, .07),
    rgba(255, 255, 255, .13)
  );
  box-shadow: inset 0 0 calc(var(--size) * .05) rgba(255, 255, 255, .22);
  -webkit-backdrop-filter: none;
  backdrop-filter: none;
}

.participant-status {
  --n: 35;
  -webkit-backdrop-filter: blur(calc(var(--size) * .331));
  backdrop-filter: blur(calc(var(--size) * .331));
}

.nav-glass-avatar {
  position: absolute;
  z-index: 0;
  inset: 0;
  display: block;
  pointer-events: none;
}

.participant-status::before {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  content: "";
  pointer-events: none;
  z-index: 2;
  background: conic-gradient(
    from 0deg,
    rgba(255, 255, 255, 0.468) 0deg,
    rgba(255, 255, 255, 0.207) 15deg,
    rgba(255, 255, 255, 0) 30deg,
    rgba(255, 255, 255, 0) 45deg,
    rgba(255, 255, 255, 0.018) 60deg,
    rgba(255, 255, 255, 0.162) 75deg,
    rgba(255, 255, 255, 0.315) 90deg,
    rgba(255, 255, 255, 0.396) 105deg,
    rgba(255, 255, 255, 0.405) 120deg,
    rgba(255, 255, 255, 0.45) 135deg,
    rgba(255, 255, 255, 0.387) 150deg,
    rgba(255, 255, 255, 0.351) 165deg,
    rgba(255, 255, 255, 0.27) 180deg,
    rgba(255, 255, 255, 0.117) 195deg,
    rgba(255, 255, 255, 0) 210deg,
    rgba(255, 255, 255, 0) 240deg,
    rgba(255, 255, 255, 0.18) 255deg,
    rgba(255, 255, 255, 0.441) 270deg,
    rgba(255, 255, 255, 0.576) 285deg,
    rgba(255, 255, 255, 0.612) 300deg,
    rgba(255, 255, 255, 0.639) 315deg,
    rgba(255, 255, 255, 0.621) 330deg,
    rgba(255, 255, 255, 0.585) 345deg,
    rgba(255, 255, 255, 0.468) 360deg
  );
  -webkit-mask: radial-gradient(
    closest-side,
    transparent 93.8%,
    #fff 96.6%,
    #fff 98.8%,
    transparent 100%
  );
  mask: radial-gradient(
    closest-side,
    transparent 93.8%,
    #fff 96.6%,
    #fff 98.8%,
    transparent 100%
  );
  mix-blend-mode: screen;
  mix-blend-mode: plus-lighter;
}

@media (max-width: 392px) {
  body {
    justify-content: flex-start;
    overflow-x: auto;
  }
}
  </style>
</head>
<body>

          <svg viewBox="0 0 35 35" aria-hidden="true">
